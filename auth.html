<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTPPass - 验证主密码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: rgba(79, 70, 229, 0.1);
      --success-color: #10b981;
      --danger-color: #ef4444;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 40px 32px 24px;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: var(--primary-color);
    }

    .logo svg {
      width: 32px;
      height: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form {
      padding: 0 32px 32px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      padding-right: 44px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
    }

    .toggle-password:hover {
      color: var(--text-primary);
    }

    .error {
      font-size: 13px;
      color: var(--danger-color);
      margin-top: 8px;
      text-align: center;
      min-height: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .attempts {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .attempts span {
      color: var(--danger-color);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>验证主密码</h1>
      <p class="subtitle">请输入主密码以访问你的密钥</p>
    </div>

    <form class="form" id="authForm">
      <div class="form-group">
        <label for="password">主密码</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="输入主密码" autocomplete="current-password" autofocus>
          <button type="button" class="toggle-password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <p class="error" id="errorText"></p>

      <button type="submit" class="btn btn-primary" id="submitBtn">解锁</button>

      <p class="attempts" id="attemptsInfo"></p>
    </form>
  </div>

  <script src="crypto.js"></script>
  <script>
    const form = document.getElementById('authForm');
    const passwordInput = document.getElementById('password');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const attemptsInfo = document.getElementById('attemptsInfo');

    // 最大尝试次数
    const MAX_ATTEMPTS = 5;
    let attempts = 0;

    // 切换密码可见性
    document.querySelector('.toggle-password').addEventListener('click', function() {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      this.innerHTML = isPassword
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    });

    // 获取重定向目标
    const urlParams = new URLSearchParams(window.location.search);
    const redirect = urlParams.get('redirect') || 'manager.html';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordInput.value;
      if (!password) {
        errorText.textContent = '请输入主密码';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '验证中...';

      try {
        // 获取存储的哈希和盐
        const result = await chrome.storage.local.get(['masterPasswordHash', 'masterPasswordSalt']);

        if (!result.masterPasswordHash || !result.masterPasswordSalt) {
          errorText.textContent = '系统错误，请重新设置';
          return;
        }

        // 验证密码
        const isValid = await CryptoUtils.verifyMasterPassword(
          password,
          result.masterPasswordHash,
          result.masterPasswordSalt
        );

        if (isValid) {
          // 创建会话
          sessionManager.createSession(password);

          // 重置尝试次数
          await chrome.storage.local.remove(['authAttempts']);

          // 跳转
          window.location.href = redirect;
        } else {
          attempts++;

          // 存储尝试次数
          await chrome.storage.local.set({ authAttempts: attempts });

          if (attempts >= MAX_ATTEMPTS) {
            errorText.textContent = '尝试次数过多，请稍后再试';
            submitBtn.disabled = true;
            submitBtn.textContent = '已锁定';

            // 5分钟后解锁
            setTimeout(() => {
              attempts = 0;
              chrome.storage.local.remove(['authAttempts']);
              submitBtn.disabled = false;
              submitBtn.textContent = '解锁';
              errorText.textContent = '';
              attemptsInfo.textContent = '';
            }, 5 * 60 * 1000);
          } else {
            errorText.textContent = '主密码错误';
            submitBtn.disabled = false;
            submitBtn.textContent = '解锁';
            attemptsInfo.innerHTML = `剩余尝试次数：<span>${MAX_ATTEMPTS - attempts}</span>`;
            passwordInput.value = '';
            passwordInput.focus();
          }
        }
      } catch (error) {
        console.error('验证失败:', error);
        errorText.textContent = '验证失败，请重试';
        submitBtn.disabled = false;
        submitBtn.textContent = '解锁';
      }
    });

    // 加载已有的尝试次数
    chrome.storage.local.get(['authAttempts'], (result) => {
      if (result.authAttempts) {
        attempts = result.authAttempts;
        if (attempts > 0) {
          attemptsInfo.innerHTML = `剩余尝试次数：<span>${MAX_ATTEMPTS - attempts}</span>`;
        }
      }
    });
  </script>
</body>
</html>
