<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPass - 验证主密码</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>验证主密码</h1>
      <p class="subtitle">请输入主密码以访问你的密钥</p>
    </div>

    <form class="form" id="authForm">
      <div class="form-group">
        <label for="password">主密码</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="输入主密码" autocomplete="current-password" autofocus>
          <button type="button" class="toggle-password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <p class="error" id="errorText"></p>

      <button type="submit" class="btn btn-primary" id="submitBtn">解锁</button>

      <p class="attempts" id="attemptsInfo"></p>
    </form>
  </div>

  <script src="crypto.js"></script>
  <script src="auth.js"></script>
</body>
</html>
