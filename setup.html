<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTPPass - 设置主密码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: rgba(79, 70, 229, 0.1);
      --success-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 40px 32px 32px;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: var(--primary-light);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--primary-color);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form {
      padding: 0 32px 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      padding-right: 44px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
    }

    .toggle-password:hover {
      color: var(--text-primary);
    }

    .password-strength {
      margin-top: 8px;
    }

    .strength-bar {
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .strength-fill {
      height: 100%;
      width: 0;
      transition: all 0.3s;
    }

    .strength-fill.weak { width: 25%; background: var(--danger-color); }
    .strength-fill.fair { width: 50%; background: var(--warning-color); }
    .strength-fill.good { width: 75%; background: #3b82f6; }
    .strength-fill.strong { width: 100%; background: var(--success-color); }

    .strength-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .error {
      font-size: 12px;
      color: var(--danger-color);
      margin-top: 6px;
      min-height: 18px;
    }

    .warning-box {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid var(--warning-color);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }

    .warning-box svg {
      flex-shrink: 0;
      color: var(--warning-color);
    }

    .warning-box p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .warning-box strong {
      color: var(--warning-color);
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .footer {
      text-align: center;
      padding: 20px 32px;
      background: var(--bg-color);
      border-top: 1px solid var(--border-color);
    }

    .footer p {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>设置主密码</h1>
      <p class="subtitle">创建一个主密码来保护你的密钥</p>
    </div>

    <form class="form" id="setupForm">
      <div class="warning-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <p>
          <strong>重要提示：</strong>主密码无法找回！<br>
          如果忘记主密码，你将无法访问已保存的密钥。请务必牢记。
        </p>
      </div>

      <div class="form-group">
        <label for="password">主密码</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="输入主密码" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-text" id="strengthText"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">确认主密码</label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" placeholder="再次输入主密码" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="confirmPassword">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <span class="error" id="confirmError"></span>
      </div>

      <p class="hint">建议使用 8 位以上包含字母、数字和符号的密码</p>

      <button type="submit" class="btn btn-primary" id="submitBtn">创建主密码</button>
    </form>

    <div class="footer">
      <p>主密码用于加密你的所有密钥，请妥善保管</p>
    </div>
  </div>

  <script src="crypto.js"></script>
  <script>
    const form = document.getElementById('setupForm');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');
    const confirmError = document.getElementById('confirmError');
    const submitBtn = document.getElementById('submitBtn');

    // 密码强度检测
    function checkStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;

      const levels = ['', 'weak', 'fair', 'good', 'good', 'strong'];
      const texts = ['', '弱', '一般', '良好', '良好', '强'];

      return { level: levels[score], text: texts[score] };
    }

    passwordInput.addEventListener('input', () => {
      const { level, text } = checkStrength(passwordInput.value);
      strengthFill.className = 'strength-fill ' + level;
      strengthText.textContent = text ? `密码强度：${text}` : '';
    });

    // 切换密码可见性
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const isPassword = target.type === 'password';
        target.type = isPassword ? 'text' : 'password';
        btn.innerHTML = isPassword
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      });
    });

    // 确认密码验证
    confirmInput.addEventListener('input', () => {
      if (confirmInput.value && confirmInput.value !== passwordInput.value) {
        confirmError.textContent = '两次输入的密码不一致';
      } else {
        confirmError.textContent = '';
      }
    });

    // 提交
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordInput.value;
      const confirm = confirmInput.value;

      // 验证
      if (password.length < 6) {
        confirmError.textContent = '密码至少需要 6 个字符';
        return;
      }

      if (password !== confirm) {
        confirmError.textContent = '两次输入的密码不一致';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '正在设置...';

      try {
        // 创建主密码哈希
        const { hash, salt } = await CryptoUtils.createMasterPasswordHash(password);

        // 存储哈希和盐
        await chrome.storage.local.set({
          masterPasswordHash: hash,
          masterPasswordSalt: salt,
          isSetupComplete: true
        });

        // 创建会话
        sessionManager.createSession(password);

        // 跳转到管理页面
        window.location.href = 'manager.html';
      } catch (error) {
        console.error('设置失败:', error);
        confirmError.textContent = '设置失败，请重试';
        submitBtn.disabled = false;
        submitBtn.textContent = '创建主密码';
      }
    });
  </script>
</body>
</html>
