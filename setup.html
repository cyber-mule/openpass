<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTPPass - 设置主密码</title>
  <link rel="stylesheet" href="setup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>设置主密码</h1>
      <p class="subtitle">创建一个主密码来保护你的密钥</p>
    </div>

    <form class="form" id="setupForm">
      <div class="warning-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <p>
          <strong>重要提示：</strong>主密码无法找回！<br>
          如果忘记主密码，你将无法访问已保存的密钥。请务必牢记。
        </p>
      </div>

      <div class="form-group">
        <label for="password">主密码</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="输入主密码" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-text" id="strengthText"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">确认主密码</label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" placeholder="再次输入主密码" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="confirmPassword">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <span class="error" id="confirmError"></span>
      </div>

      <p class="hint">建议使用 8 位以上包含字母、数字和符号的密码</p>

      <button type="submit" class="btn btn-primary" id="submitBtn">创建主密码</button>
    </form>

    <div class="footer">
      <p>主密码用于加密你的所有密钥，请妥善保管</p>
    </div>
  </div>

  <script src="crypto.js"></script>
  <script src="setup.js"></script>
</body>
</html>
