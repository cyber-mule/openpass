name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Get version info
        id: version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # 去掉 -rc/-alpha/-beta 后缀，manifest.json 不接受
          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_HASH="${{ github.sha }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

          echo "Building version: $VERSION"
          echo "Release tag: $TAG"
          echo "Build time: $BUILD_TIME"
          echo "Commit: $COMMIT_HASH"

      - name: Update version in wxt.config.ts and package.json
        run: |
          node -e "
            const fs = require('fs');
            // Update wxt.config.ts version
            const configPath = 'wxt.config.ts';
            let config = fs.readFileSync(configPath, 'utf8');
            config = config.replace(/version:\s*['\"][^'\"]+['\"]/, \"version: '${{ steps.version.outputs.version }}'\");
            fs.writeFileSync(configPath, config);
            console.log('Updated wxt.config.ts version to ${{ steps.version.outputs.version }}');

            // Update package.json version
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log('Updated package.json version to ${{ steps.version.outputs.version }}');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          npx wxt zip
          # WXT 输出到 .output/chrome-mv3.zip 或类似路径
          OUTPUT_ZIP=$(find .output -name '*.zip' -type f | head -1)
          if [ -n "$OUTPUT_ZIP" ]; then
            cp "$OUTPUT_ZIP" "${TAG}.zip"
            echo "Package created: ${TAG}.zip"
          else
            # Fallback: manually zip .output/chrome-mv3
            cd .output/chrome-mv3
            zip -r "../../${TAG}.zip" .
            cd ../..
            echo "Package created (fallback): ${TAG}.zip"
          fi
          ls -la *.zip

      - name: Find previous tag
        id: previoustag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Build Changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          fromTag: ${{ steps.previoustag.outputs.tag }}
          toTag: ${{ steps.tag.outputs.tag }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/#{{FROM_TAG}}...#{{TO_TAG}}",
              "categories": [
                { "title": "## 🚀 新功能", "labels": ["feat"] },
                { "title": "## 🐛 Bug 修复", "labels": ["fix"] },
                { "title": "## 📝 文档", "labels": ["docs"] },
                { "title": "## ♻️ 重构", "labels": ["refactor"] },
                { "title": "## 🔧 维护", "labels": ["chore"] }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|docs|chore|refactor|ci|style|perf|test)(?:\\([^)]*\\))?!?:.*",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "transformers": [
                {
                  "pattern": "^(feat|fix|docs|chore|refactor|ci|style|perf|test)(?:\\([^)]*\\))?!?: (.*)$",
                  "target": "$2"
                }
              ],
              "pr_template": "- #{{TITLE}}",
              "commit_template": "- #{{TITLE}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.tag.outputs.tag }}.zip
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-alpha') || contains(steps.tag.outputs.tag, '-beta') || contains(steps.tag.outputs.tag, '-dev') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Release ${{ steps.tag.outputs.tag }} built and uploaded successfully!"
          echo "📦 Package: ${{ steps.tag.outputs.tag }}.zip"
          echo "🕐 Build time: ${{ steps.version.outputs.build_time }}"
          echo "🔗 Commit: ${{ steps.version.outputs.commit_hash }}"
