name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version info
        id: version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_HASH="${{ github.sha }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

          echo "Building version: $VERSION"
          echo "Release tag: $TAG"
          echo "Build time: $BUILD_TIME"
          echo "Commit: $COMMIT_HASH"

      - name: Update version and inject build signature
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '${{ steps.version.outputs.version }}';
            manifest.build_time = '${{ steps.version.outputs.build_time }}';
            manifest.commit_hash = '${{ steps.version.outputs.commit_hash }}';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          echo "Updated version to ${{ steps.version.outputs.version }}"

      - name: Build extension
        run: |
          mkdir -p build/openpass

          # 核心文件
          cp -r icons build/openpass/
          cp manifest.json build/openpass/
          cp background.js build/openpass/
          cp totp.js build/openpass/
          cp crypto.js build/openpass/
          cp jsQR.min.js build/openpass/
          cp backup-manager.js build/openpass/
          cp auto-backup.js build/openpass/

          # Popup 页面
          cp popup.html build/openpass/
          cp popup.css build/openpass/
          cp popup.js build/openpass/

          # Manager 页面
          cp manager.html build/openpass/
          cp manager.css build/openpass/
          cp manager.js build/openpass/

          # Setup 和 Auth 页面
          cp setup.html build/openpass/
          cp setup.css build/openpass/
          cp setup.js build/openpass/
          cp auth.html build/openpass/
          cp auth.css build/openpass/
          cp auth.js build/openpass/

          # Content Script
          cp content.js build/openpass/
          cp content.css build/openpass/

          # 打包为 zip
          TAG="${{ steps.tag.outputs.tag }}"
          cd build
          zip -r ../${TAG}.zip openpass
          cd ..

          echo "Extension packaged successfully"
          ls -la *.zip

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🚀 新功能",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## 🐛 Bug 修复",
                  "labels": ["fix", "bugfix"]
                },
                {
                  "title": "## 📝 文档",
                  "labels": ["docs", "doc"]
                },
                {
                  "title": "## 🔧 维护",
                  "labels": ["chore", "refactor", "perf", "style", "test", "ci"]
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|feature):(.*)$",
                  "target": "feat"
                },
                {
                  "pattern": "^(fix|bugfix):(.*)$",
                  "target": "fix"
                },
                {
                  "pattern": "^(docs|doc):(.*)$",
                  "target": "docs"
                },
                {
                  "pattern": "^(chore|refactor|perf|style|test|ci):(.*)$",
                  "target": "chore"
                }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/#{{FROM_TAG}}...#{{TO_TAG}}",
              "pr_template": "- #{{TITLE}} (#{{SHA}})",
              "empty_template": "- No changes"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.tag.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Release ${{ steps.tag.outputs.tag }} built and uploaded successfully!"
          echo "📦 Package: ${{ steps.tag.outputs.tag }}.zip"
          echo "🕐 Build time: ${{ steps.version.outputs.build_time }}"
          echo "🔗 Commit: ${{ steps.version.outputs.commit_hash }}"