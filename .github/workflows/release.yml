name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_HASH="${{ github.sha }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

          echo "Building version: $VERSION"
          echo "Release tag: $TAG_NAME"
          echo "Build time: $BUILD_TIME"
          echo "Commit: $COMMIT_HASH"

      - name: Inject build signature
        run: |
          # 使用 node 脚本注入构建签名
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.build_time = '${{ steps.version.outputs.build_time }}';
            manifest.commit_hash = '${{ steps.version.outputs.commit_hash }}';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
          "

          echo "Build signature injected into manifest.json"

      - name: Build extension
        run: |
          # 创建构建目录
          mkdir -p build/openpass

          # 复制所有必要文件
          cp -r icons build/openpass/
          cp manifest.json build/openpass/
          cp background.js build/openpass/
          cp totp.js build/openpass/
          cp crypto.js build/openpass/
          cp jsQR.min.js build/openpass/
          cp backup-manager.js build/openpass/
          cp auto-backup.js build/openpass/

          # Popup 页面
          cp popup.html build/openpass/
          cp popup.css build/openpass/
          cp popup.js build/openpass/

          # Manager 页面
          cp manager.html build/openpass/
          cp manager.css build/openpass/
          cp manager.js build/openpass/

          # Setup 和 Auth 页面
          cp setup.html build/openpass/
          cp setup.css build/openpass/
          cp setup.js build/openpass/
          cp auth.html build/openpass/
          cp auth.css build/openpass/
          cp auth.js build/openpass/

          # Content Script
          cp content.js build/openpass/
          cp content.css build/openpass/

          # 打包为 zip
          cd build
          zip -r ../${{ steps.version.outputs.tag_name }}.zip openpass
          cd ..

          echo "Extension packaged successfully"
          ls -la *.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.version.outputs.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Release ${{ steps.version.outputs.tag_name }} built and uploaded successfully!"
          echo "📦 Package: ${{ steps.version.outputs.tag_name }}.zip"
          echo "🕐 Build time: ${{ steps.version.outputs.build_time }}"
          echo "🔗 Commit: ${{ steps.version.outputs.commit_hash }}"