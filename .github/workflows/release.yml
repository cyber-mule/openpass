name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Get version info
        id: version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # 去掉 -rc/-alpha/-beta 后缀，manifest.json 不接受
          VERSION="${TAG#v}"
          VERSION="${VERSION%%-*}"
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_HASH="${{ github.sha }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

          echo "Building version: $VERSION"
          echo "Release tag: $TAG"
          echo "Build time: $BUILD_TIME"
          echo "Commit: $COMMIT_HASH"

      - name: Update version in wxt.config.ts and package.json
        run: |
          node -e "
            const fs = require('fs');
            // Update wxt.config.ts version
            const configPath = 'wxt.config.ts';
            let config = fs.readFileSync(configPath, 'utf8');
            config = config.replace(/version:\s*['\"][^'\"]+['\"]/, \"version: '${{ steps.version.outputs.version }}'\");
            fs.writeFileSync(configPath, config);
            console.log('Updated wxt.config.ts version to ${{ steps.version.outputs.version }}');

            // Update package.json version
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log('Updated package.json version to ${{ steps.version.outputs.version }}');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          npx wxt zip
          # WXT 输出到 .output/chrome-mv3.zip 或类似路径
          OUTPUT_ZIP=$(find .output -name '*.zip' -type f | head -1)
          if [ -n "$OUTPUT_ZIP" ]; then
            cp "$OUTPUT_ZIP" "${TAG}.zip"
            echo "Package created: ${TAG}.zip"
          else
            # Fallback: manually zip .output/chrome-mv3
            cd .output/chrome-mv3
            zip -r "../../${TAG}.zip" .
            cd ../..
            echo "Package created (fallback): ${TAG}.zip"
          fi
          ls -la *.zip

      - name: Find previous tag
        id: previoustag
        run: |
          # 先尝试找当前 tag 之前的 tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.tag.outputs.tag }}"^ 2>/dev/null || echo "")
          # 如果没找到，尝试找仓库中最早的 tag
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 --always 2>/dev/null || echo "")
          fi
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREV_TAG:-<none>}"

      - name: Build Changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          FROM_TAG="${{ steps.previoustag.outputs.tag }}"
          
          if [ -n "$FROM_TAG" ]; then
            RANGE="${FROM_TAG}..${TAG}"
          else
            RANGE="${TAG}"
            FROM_TAG="first commit"
          fi
          
          # 获取提交列表并按类型分类
          COMMITS=$(git log --pretty=format:"%s" $RANGE 2>/dev/null || git log --pretty=format:"%s")
          
          # 分类提交
          FEATS=$(echo "$COMMITS" | grep -E "^feat(\([^)]*\))?!?:" | sed 's/^feat(\([^)]*\))!?: \(.*\)/- \2/' | sed 's/^feat: \(.*\)/- \1/' || true)
          FIXES=$(echo "$COMMITS" | grep -E "^fix(\([^)]*\))?!?:" | sed 's/^fix(\([^)]*\))!?: \(.*\)/- \2/' | sed 's/^fix: \(.*\)/- \1/' || true)
          DOCS=$(echo "$COMMITS" | grep -E "^docs(\([^)]*\))?!?:" | sed 's/^docs(\([^)]*\))!?: \(.*\)/- \2/' | sed 's/^docs: \(.*\)/- \1/' || true)
          REFACTOR=$(echo "$COMMITS" | grep -E "^refactor(\([^)]*\))?!?:" | sed 's/^refactor(\([^)]*\))!?: \(.*\)/- \2/' | sed 's/^refactor: \(.*\)/- \1/' || true)
          CHORE=$(echo "$COMMITS" | grep -E "^chore(\([^)]*\))?!?:" | sed 's/^chore(\([^)]*\))!?: \(.*\)/- \2/' | sed 's/^chore: \(.*\)/- \1/' || true)
          CI=$(echo "$COMMITS" | grep -E "^ci(\([^)]*\))?!?:" | sed 's/^ci(\([^)]*\))!?: \(.*\)/- \2/' | sed 's/^ci: \(.*\)/- \1/' || true)
          
          # 生成 changelog
          CHANGELOG=""
          if [ -n "$FEATS" ]; then
            CHANGELOG="${CHANGELOG}## 🚀 新功能\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## 🐛 Bug 修复\n${FIXES}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}## 📝 文档\n${DOCS}\n\n"
          fi
          if [ -n "$REFACTOR" ]; then
            CHANGELOG="${CHANGELOG}## ♻️ 重构\n${REFACTOR}\n\n"
          fi
          if [ -n "$CI" ]; then
            CHANGELOG="${CHANGELOG}## 🔧 CI/CD\n${CI}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            CHANGELOG="${CHANGELOG}## 🔧 维护\n${CHORE}\n\n"
          fi
          
          # 如果没有分类提交，列出所有
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG=$(echo "$COMMITS" | sed 's/^/- /' | tr '\n' '\\n')
          fi
          
          # 添加完整变更链接
          if [ -n "${{ steps.previoustag.outputs.tag }}" ]; then
            CHANGELOG="${CHANGELOG}\n\n**完整变更**: https://github.com/${{ github.repository }}/compare/${FROM_TAG}...${TAG}"
          fi
          
          # 输出到文件和 step output
          echo "changelog<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT
          
          echo "Generated changelog:"
          echo -e "$CHANGELOG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.tag.outputs.tag }}.zip
          prerelease: ${{ contains(steps.tag.outputs.tag, '-rc') || contains(steps.tag.outputs.tag, '-alpha') || contains(steps.tag.outputs.tag, '-beta') || contains(steps.tag.outputs.tag, '-dev') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Release ${{ steps.tag.outputs.tag }} built and uploaded successfully!"
          echo "📦 Package: ${{ steps.tag.outputs.tag }}.zip"
          echo "🕐 Build time: ${{ steps.version.outputs.build_time }}"
          echo "🔗 Commit: ${{ steps.version.outputs.commit_hash }}"
