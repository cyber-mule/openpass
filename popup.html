<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA Authenticator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <h1 class="title">2FA 验证器</h1>
      <div class="header-actions">
        <button id="addBtn" class="icon-btn" title="添加密钥">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
          </svg>
        </button>
        <div class="dropdown">
          <button id="menuBtn" class="icon-btn" title="更多操作">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="1"></circle>
              <circle cx="19" cy="12" r="1"></circle>
              <circle cx="5" cy="12" r="1"></circle>
            </svg>
          </button>
          <div id="dropdownMenu" class="dropdown-menu hidden">
            <button id="exportBtn" class="dropdown-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              <span>导出备份</span>
            </button>
            <button id="importBtn" class="dropdown-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              <span>导入备份</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 主页 - 所有密码列表 -->
      <div id="homePage" class="page active">
        <!-- 搜索框 -->
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" placeholder="搜索站点或名称...">
        </div>

        <!-- 当前网站匹配提示 -->
        <div id="currentSiteMatch" class="current-site-match hidden">
          <div class="match-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            <span>当前网站</span>
          </div>
          <div id="currentSiteCodes" class="current-site-codes">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 所有密码列表 -->
        <div class="secrets-section">
          <div class="section-header">
            <span>全部密钥</span>
            <span id="secretsCount" class="count-badge">0</span>
          </div>
          <div id="allSecretsList" class="secrets-list">
            <!-- 动态生成 -->
          </div>
          <div id="emptyList" class="empty-list hidden">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <p>暂无保存的密钥</p>
            <p class="hint">点击右上角 + 添加</p>
          </div>
          <div id="noSearchResult" class="empty-list hidden">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <p>未找到匹配结果</p>
          </div>
        </div>
      </div>

      <!-- 创建密钥页 -->
      <div id="createPage" class="page">
        <div class="page-header">
          <button id="backBtn" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <h2 class="page-title">添加密钥</h2>
        </div>
        <form id="createForm" class="create-form">
          <div class="form-group">
            <label for="secretInput">密钥</label>
            <input type="text" id="secretInput" placeholder="输入密钥（字母和数字）" autocomplete="off" spellcheck="false">
            <span class="hint-text">支持标准 TOTP 密钥格式，如：JBSWY3DPEHPK3PXP</span>
            <span id="secretError" class="error-text"></span>
          </div>

          <div class="form-group">
            <label for="digitsInput">验证码长度</label>
            <select id="digitsInput">
              <option value="6" selected>6 位</option>
              <option value="8">8 位</option>
            </select>
          </div>

          <div class="form-group">
            <label for="siteInput">目标站点</label>
            <input type="text" id="siteInput" placeholder="例如: github.com" autocomplete="off">
            <span class="hint-text">支持域名匹配，如 github.com</span>
          </div>

          <div class="form-group">
            <label for="nameInput">名称（可选）</label>
            <input type="text" id="nameInput" placeholder="例如: GitHub" autocomplete="off">
          </div>

          <button type="submit" class="btn-primary">保存密钥</button>
        </form>
      </div>

      <!-- 编辑密钥页 -->
      <div id="editPage" class="page">
        <div class="page-header">
          <button id="editBackBtn" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <h2 class="page-title">编辑密钥</h2>
          <button id="deleteBtn" class="delete-btn" title="删除">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
        <form id="editForm" class="create-form">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label for="editSecretInput">密钥</label>
            <input type="text" id="editSecretInput" placeholder="输入密钥" autocomplete="off" spellcheck="false">
            <span id="editSecretError" class="error-text"></span>
          </div>

          <div class="form-group">
            <label for="editDigitsInput">验证码长度</label>
            <select id="editDigitsInput">
              <option value="6">6 位</option>
              <option value="8">8 位</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editSiteInput">目标站点</label>
            <input type="text" id="editSiteInput" placeholder="例如: github.com" autocomplete="off">
          </div>

          <div class="form-group">
            <label for="editNameInput">名称（可选）</label>
            <input type="text" id="editNameInput" placeholder="例如: GitHub" autocomplete="off">
          </div>

          <button type="submit" class="btn-primary">保存修改</button>
        </form>
      </div>
    </main>
  </div>

  <!-- 恢复选项对话框 -->
  <div id="restoreModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>导入备份</h3>
      </div>
      <div class="modal-body">
        <p class="modal-text">检测到备份文件包含 <span id="importCount">0</span> 个密钥。</p>
        <p class="modal-text">当前已有 <span id="currentCount">0</span> 个密钥。</p>
        <p class="modal-text">请选择导入方式：</p>
      </div>
      <div class="modal-footer">
        <button id="mergeBtn" class="btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
          </svg>
          合并
        </button>
        <button id="overwriteBtn" class="btn-danger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          覆盖
        </button>
        <button id="cancelRestoreBtn" class="btn-text">取消</button>
      </div>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept=".json" style="display: none;">

  <script src="totp.js"></script>
  <script src="popup.js"></script>
</body>
</html>
